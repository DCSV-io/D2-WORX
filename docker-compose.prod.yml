# D2-WORX Docker Compose — Production / Staging Stack
# Extends docker-compose.yml with production-specific overrides.
#
# Usage (Compose):
#   docker compose --env-file .env.prod \
#     -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Usage (Swarm):
#   docker stack deploy -c docker-compose.yml -c docker-compose.prod.yml d2-worx
#
# Key differences from dev:
#   - Pre-built images from ghcr.io (no build: context, no source mounts)
#   - ASPNETCORE_ENVIRONMENT=Production, LOG_LEVEL=information
#   - deploy: blocks with restart_policy, resource limits (Swarm-native)
#   - Health checks compatible with prod images (no curl in aspnet:10.0)
#   - Dev-only services disabled via profiles (pgAdmin, RedisInsight, Portainer)
#   - d2-node-init disabled (prod images have deps baked in)

services:
  # ==========================================================================
  # Application Services — Production overrides
  # ==========================================================================

  d2-geo:
    build:
      target: prod
    image: ghcr.io/dcsv-io/d2-worx/d2-geo:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LOG_LEVEL: information
    # Dev compose uses curl for health check, but aspnet:10.0 prod image
    # doesn't include curl. Use wget (available in Debian-based aspnet image).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --no-check-certificate http://localhost:${GEO_PORT}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-auth:
    build:
      target: prod
    image: ghcr.io/dcsv-io/d2-worx/d2-auth:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      LOG_LEVEL: info
    depends_on:
      d2-postgres:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
      d2-rabbitmq:
        condition: service_healthy
      d2-geo:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-comms:
    build:
      target: prod
    image: ghcr.io/dcsv-io/d2-worx/d2-comms:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      LOG_LEVEL: info
    depends_on:
      d2-postgres:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
      d2-rabbitmq:
        condition: service_healthy
      d2-geo:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-gateway:
    build:
      target: prod
    image: ghcr.io/dcsv-io/d2-worx/d2-gateway:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LOG_LEVEL: information
    # Same wget fix as d2-geo (no curl in aspnet:10.0 prod image).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --no-check-certificate http://localhost:${GATEWAY_PORT}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-dkron-mgr:
    build:
      target: prod
    image: ghcr.io/dcsv-io/d2-worx/d2-dkron-mgr:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      LOG_LEVEL: info
    depends_on:
      d2-dkron:
        condition: service_healthy
      d2-gateway:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  d2-sveltekit:
    build:
      target: prod
    image: ghcr.io/dcsv-io/d2-worx/d2-sveltekit:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      LOG_LEVEL: info
    # Prod SvelteKit uses adapter-node (runs `node build`, not Vite).
    # Health check can use Node.js fetch (always available).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:${SVELTEKIT_PORT}'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      d2-gateway:
        condition: service_healthy
      d2-auth:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ==========================================================================
  # Infrastructure — deploy blocks for Swarm + tighter resource limits
  # ==========================================================================

  d2-postgres:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 120s
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  d2-redis:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-rabbitmq:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-minio:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-dkron:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 120s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ==========================================================================
  # Observability — deploy blocks for Swarm
  # ==========================================================================

  d2-loki:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  d2-alloy:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  d2-grafana:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ==========================================================================
  # Dev-only services — disabled in production via profiles
  # ==========================================================================

  d2-pgadmin:
    profiles: [dev-tools]

  d2-redisinsight:
    profiles: [dev-tools]

  d2-portainer:
    profiles: [dev-tools]

  # d2-node-init is dev-only (prod images have deps baked in from build stage).
  # Can't use profiles (Node.js services depend_on it). Override to no-op instead.
  d2-node-init:
    entrypoint: ["sh", "-c", "echo 'Prod: deps baked into images — skipping install'"]
    volumes: []
