syntax = "proto3";

package d2.files.v1;

option csharp_namespace = "D2.Services.Protos.Files.V1";

// SignalRBridge — implemented by the SignalR Gateway (.NET).
// The Files service calls this RPC to push real-time updates to connected browser clients.
service SignalRBridge {
  // Push an event to a specific user's connected browser session(s).
  rpc PushToUser(PushToUserRequest) returns (PushToUserResponse);
}

message PushToUserRequest {
  string target_user_id = 1;
  string event = 2; // e.g., "file:ready", "file:rejected"
  string payload_json = 3; // JSON-serialized event payload
}

message PushToUserResponse {
  bool delivered = 1;
}
