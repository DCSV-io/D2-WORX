<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>%sveltekit.status% — DCSV WORX</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #0a0a0a;
        color: #fafafa;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 4rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 1.25rem;
        color: #a1a1aa;
        margin-top: 1rem;
      }
      a {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.5rem 1.5rem;
        background: #fafafa;
        color: #0a0a0a;
        border-radius: 0.375rem;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
      }
      a:hover {
        background: #e4e4e7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>%sveltekit.status%</h1>
      <p>%sveltekit.error.message%</p>
      <a href="/">Go home</a>
    </div>
  </body>
</html>
