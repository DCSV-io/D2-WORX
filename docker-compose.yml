# D2-WORX Docker Compose — Dev Environment
# Replaces .NET Aspire AppHost for local development.
#
# Usage:
#   docker compose --env-file .env.local up -d        # Start everything
#   docker compose --env-file .env.local up -d d2-geo  # Start single service + deps
#   docker compose --env-file .env.local down           # Stop everything
#   docker compose --env-file .env.local logs -f d2-geo # Tail logs
#
# --env-file .env.local is required for ${VAR} interpolation in this file.
# Each service also loads .env.local via env_file for runtime env vars.
#
# Startup chain (via depends_on + health checks):
#   MinIO → init buckets → Loki, Tempo, Mimir → Alloy, Grafana
#   PG, Redis, RMQ → healthy
#     → Geo → healthy
#       → Auth, Comms → healthy
#         → Gateway → healthy
#           → SvelteKit, Dkron-mgr
#
# Hot reload (dev):
#   Source is volume-mounted into containers. File watchers inside containers
#   detect changes: dotnet watch (.NET), tsx watch (Node.js), vite dev (SvelteKit).
#   Dependency changes (new NuGet/npm packages) require: docker compose build <service>

name: d2-worx

networks:
  d2-network:
    driver: bridge

volumes:
  d2-minio-data:
  d2-minio-tokens:
  d2-loki-data:
  d2-tempo-data:
  d2-mimir-data:
  d2-alloy-data:
  d2-grafana-data:
  d2-postgres-data:
  d2-redis-data:
  d2-redisinsight-data:
  d2-rabbitmq-data:
  d2-dkron-data:
  d2-clamav-data:
  d2-portainer-data:
  d2-node-modules:
  d2-sveltekit-modules:

services:
  # ==========================================================================
  # Object Storage
  # ==========================================================================

  d2-minio:
    image: ${MINIO_IMAGE}:${MINIO_TAG}
    container_name: ${MINIO_NAME}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_USERNAME}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_BROWSER: "on"
      # AMQP notification — file-uploaded events → RabbitMQ
      MINIO_NOTIFY_AMQP_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_AMQP_URL_PRIMARY: "amqp://${MQ_USERNAME}:${MQ_PASSWORD}@${RABBITMQ_NAME}:5672"
      MINIO_NOTIFY_AMQP_EXCHANGE_PRIMARY: "files.events"
      MINIO_NOTIFY_AMQP_EXCHANGE_TYPE_PRIMARY: "direct"
      MINIO_NOTIFY_AMQP_ROUTING_KEY_PRIMARY: "file-uploaded"
      MINIO_NOTIFY_AMQP_DURABLE_PRIMARY: "on"
    volumes:
      - d2-minio-data:/data
    command: server /data --console-address :9001
    networks: [d2-network]
    depends_on:
      d2-rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  d2-minio-init:
    image: ${MINIO_MC_IMAGE}:${MINIO_MC_TAG}
    container_name: ${MINIO_INIT_NAME}
    environment:
      MINIO_ROOT_USER: ${S3_USERNAME}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - d2-minio-tokens:/minio-token
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set myminio http://${MINIO_NAME}:9000 ${S3_USERNAME} ${S3_PASSWORD} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET_LOKI} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET_TEMPO} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET_MIMIR_BLOCKS} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET_MIMIR_RULER} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET_UPLOADS} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET_FILES} &&
      mc event add myminio/${MINIO_BUCKET_FILES} arn:minio:sqs::PRIMARY:amqp --event put --ignore-existing &&
      mc admin prometheus generate myminio > /minio-token/prometheus-config.yaml &&
      echo 'MinIO buckets and Prometheus token initialized successfully'
      "
    networks: [d2-network]
    depends_on:
      d2-minio:
        condition: service_healthy
    restart: "no"

  # ==========================================================================
  # Observability
  # ==========================================================================

  d2-loki:
    image: ${LOKI_IMAGE}:${LOKI_TAG}
    container_name: ${LOKI_NAME}
    ports:
      - "${LOKI_HTTP_PORT}:3100"
      - "${LOKI_GRPC_PORT}:9095"
    environment:
      MINIO_ROOT_USER: ${S3_USERNAME}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_NAME: ${MINIO_NAME}
      MINIO_BUCKET_LOKI: ${MINIO_BUCKET_LOKI}
    volumes:
      - ./observability/loki/config:/etc/loki:ro
      - d2-loki-data:/loki
    command: -config.file=/etc/loki/loki.yaml -config.expand-env=true
    networks: [d2-network]
    depends_on:
      d2-minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  d2-tempo:
    image: ${TEMPO_IMAGE}:${TEMPO_TAG}
    container_name: ${TEMPO_NAME}
    ports:
      - "${TEMPO_HTTP_PORT}:3200"
      - "${TEMPO_GRPC_PORT}:9096"
    environment:
      MINIO_ROOT_USER: ${S3_USERNAME}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_NAME: ${MINIO_NAME}
      MINIO_BUCKET_TEMPO: ${MINIO_BUCKET_TEMPO}
    volumes:
      - ./observability/tempo/config:/etc/tempo:ro
      - d2-tempo-data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml -config.expand-env=true
    networks: [d2-network]
    depends_on:
      d2-minio-init:
        condition: service_completed_successfully
    # Tempo ships a distroless image (no shell/wget), so no in-container health check.
    # Alloy and Grafana have built-in retry logic for backend connections.
    restart: unless-stopped

  d2-mimir:
    image: ${MIMIR_IMAGE}:${MIMIR_TAG}
    container_name: ${MIMIR_NAME}
    ports:
      - "${MIMIR_HTTP_PORT}:9009"
      - "${MIMIR_GRPC_PORT}:9097"
    environment:
      MINIO_ROOT_USER: ${S3_USERNAME}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_NAME: ${MINIO_NAME}
      MINIO_BUCKET_MIMIR_BLOCKS: ${MINIO_BUCKET_MIMIR_BLOCKS}
      MINIO_BUCKET_MIMIR_RULER: ${MINIO_BUCKET_MIMIR_RULER}
    volumes:
      - ./observability/mimir/config:/etc/mimir:ro
      - d2-mimir-data:/var/mimir
    command: -config.file=/etc/mimir/mimir.yaml -config.expand-env=true
    networks: [d2-network]
    depends_on:
      d2-minio-init:
        condition: service_completed_successfully
    # Mimir ships a distroless image (no shell/wget), so no in-container health check.
    # Alloy and Grafana have built-in retry logic for backend connections.
    restart: unless-stopped

  d2-cadvisor:
    image: ${CADVISOR_IMAGE}:${CADVISOR_TAG}
    container_name: ${CADVISOR_NAME}
    ports:
      - "${CADVISOR_PORT}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - --housekeeping_interval=10s
      - --docker_only=true
    networks: [d2-network]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  d2-alloy:
    image: ${ALLOY_IMAGE}:${ALLOY_TAG}
    container_name: ${ALLOY_NAME}
    ports:
      - "${ALLOY_HTTP_PORT}:12345"
      - "${OTLP_GRPC_PORT}:4317"
      - "${OTLP_HTTP_PORT}:4318"
      - "${FARO_RECEIVER_PORT}:12347"
    environment:
      ALLOY_DEPLOY_MODE: docker
      MINIO_ROOT_USER: ${S3_USERNAME}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      # Container names + endpoints for config.alloy env() references.
      CADVISOR_NAME: ${CADVISOR_NAME}
      GATEWAY_METRICS_ENDPOINT: "${GATEWAY_SERVICE_NAME}:${GATEWAY_PORT}"
      GEO_METRICS_ENDPOINT: "${GEO_SERVICE_NAME}:${GEO_PORT}"
      PG_EXPORTER_NAME: ${PG_EXPORTER_NAME}
      REDIS_EXPORTER_NAME: ${REDIS_EXPORTER_NAME}
      RABBITMQ_NAME: ${RABBITMQ_NAME}
      MIMIR_NAME: ${MIMIR_NAME}
      LOKI_NAME: ${LOKI_NAME}
      TEMPO_NAME: ${TEMPO_NAME}
      MINIO_NAME: ${MINIO_NAME}
      OTEL_CLUSTER_NAME: ${OTEL_CLUSTER_NAME}
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT}
      FARO_CORS_ORIGINS: ${FARO_CORS_ORIGINS}
    volumes:
      - /proc:/rootproc:ro
      - /sys:/sys:ro
      - /:/rootfs:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/alloy/config:/etc/alloy:ro
      - d2-alloy-data:/var/lib/alloy/data
      - d2-minio-tokens:/minio-token:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=public-preview
    networks: [d2-network]
    depends_on:
      d2-cadvisor:
        condition: service_healthy
      d2-mimir:
        condition: service_started
      d2-loki:
        condition: service_healthy
      d2-tempo:
        condition: service_started
      d2-minio-init:
        condition: service_completed_successfully
    # Alloy image has /bin/sh but no wget/curl — cannot run in-container health check.
    # Alloy has built-in retry logic for all backends (Loki, Tempo, Mimir).
    restart: unless-stopped

  d2-grafana:
    image: ${GRAFANA_IMAGE}:${GRAFANA_TAG}
    container_name: ${GRAFANA_NAME}
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      # Security — require authentication.
      GF_SECURITY_ADMIN_USER: ${OTEL_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD: ${OTEL_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      # Security — values differ between DEV and PROD (set in .env.local).
      GF_SECURITY_COOKIE_SECURE: ${GRAFANA_COOKIE_SECURE}
      GF_SECURITY_COOKIE_SAMESITE: ${GRAFANA_COOKIE_SAMESITE}
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: ${GRAFANA_STRICT_TRANSPORT_SECURITY}
      # Features.
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      # Data directory.
      # Datasource container names for provisioning env var expansion.
      MIMIR_NAME: ${MIMIR_NAME}
      LOKI_NAME: ${LOKI_NAME}
      TEMPO_NAME: ${TEMPO_NAME}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - d2-grafana-data:/var/lib/grafana
    networks: [d2-network]
    depends_on:
      d2-tempo:
        condition: service_started
      d2-loki:
        condition: service_healthy
      d2-mimir:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Infrastructure
  # ==========================================================================

  d2-postgres:
    image: postgres:${POSTGRES_TAG}
    container_name: ${POSTGRES_NAME}
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # PG 18+ changed default PGDATA; set explicitly for forward compat.
      PGDATA: /var/lib/postgresql/data
    volumes:
      - d2-postgres-data:/var/lib/postgresql/data
    networks: [d2-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  d2-pgadmin:
    image: dpage/pgadmin4:${PGADMIN_TAG}
    container_name: ${PGADMIN_NAME}
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DBA_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DBA_PASSWORD}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    networks: [d2-network]
    depends_on:
      d2-postgres:
        condition: service_healthy
    restart: unless-stopped

  d2-pg-exporter:
    image: ${PG_EXPORTER_IMAGE}:${PG_EXPORTER_TAG}
    container_name: ${PG_EXPORTER_NAME}
    ports:
      - "${PG_EXPORTER_PORT}:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${POSTGRES_NAME}:5432/postgres?sslmode=disable"
    networks: [d2-network]
    depends_on:
      d2-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  d2-redis:
    image: redis:${REDIS_TAG}
    container_name: ${REDIS_NAME}
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${CACHE_PASSWORD}
    volumes:
      - d2-redis-data:/data
    networks: [d2-network]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CACHE_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  d2-redisinsight:
    image: redis/redisinsight:${REDISINSIGHT_TAG}
    container_name: ${REDISINSIGHT_NAME}
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    volumes:
      - d2-redisinsight-data:/data
    networks: [d2-network]
    depends_on:
      d2-redis:
        condition: service_healthy
    restart: unless-stopped

  d2-redis-exporter:
    image: ${REDIS_EXPORTER_IMAGE}:${REDIS_EXPORTER_TAG}
    container_name: ${REDIS_EXPORTER_NAME}
    ports:
      - "${REDIS_EXPORTER_PORT}:9121"
    environment:
      REDIS_ADDR: "${REDIS_NAME}:${REDIS_PORT}"
      REDIS_PASSWORD: ${CACHE_PASSWORD}
    networks: [d2-network]
    depends_on:
      d2-redis:
        condition: service_healthy
    # Redis exporter is a distroless image — no shell or health check tools available.
    restart: unless-stopped

  # ==========================================================================
  # Malware Scanning
  # ==========================================================================

  d2-clamav:
    image: ${CLAMAV_IMAGE}:${CLAMAV_TAG}
    container_name: ${CLAMAV_NAME}
    ports:
      - "${CLAMAV_PORT}:3310"
    volumes:
      - d2-clamav-data:/var/lib/clamav
    networks: [d2-network]
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  d2-rabbitmq:
    image: rabbitmq:${RABBITMQ_TAG}
    container_name: ${RABBITMQ_NAME}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
      - "${RABBITMQ_METRICS_PORT}:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD}
    volumes:
      - d2-rabbitmq-data:/var/lib/rabbitmq
    networks: [d2-network]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  d2-dkron:
    image: ${DKRON_IMAGE}:${DKRON_TAG}
    container_name: ${DKRON_NAME}
    ports:
      - "${DKRON_DASHBOARD_PORT}:8080"
    command: agent --server --bootstrap-expect=1 --node-name=${DKRON_NAME}
    volumes:
      - d2-dkron-data:/dkron.data
    networks: [d2-network]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Dev Tools
  # ==========================================================================

  d2-portainer:
    image: ${PORTAINER_IMAGE}:${PORTAINER_TAG}
    container_name: d2-portainer
    # Admin credentials: admin / <your password>
    # PORTAINER_ADMIN_PASSWORD_HASH must be a bcrypt hash (see .env.local.example for generation).
    command: --admin-password '${PORTAINER_ADMIN_PASSWORD_HASH}'
    ports:
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - d2-portainer-data:/data
    networks: [d2-network]
    restart: unless-stopped

  # ==========================================================================
  # Node.js Dependency Init (runs once, populates shared node_modules volume)
  # ==========================================================================

  d2-node-init:
    image: node:24-slim
    container_name: d2-node-init
    entrypoint:
      - sh
      - -c
      - |
        corepack enable && corepack prepare pnpm@10.30.3 --activate
        pnpm install --frozen-lockfile
    working_dir: /app
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./backends/node:/app/backends/node
      - ./clients/web/package.json:/app/clients/web/package.json:ro
      - ./contracts:/app/contracts:ro
      - d2-node-modules:/app/node_modules
      - d2-sveltekit-modules:/app/clients/web/node_modules
    restart: "no"
    networks: [d2-network]

  # ==========================================================================
  # Application Services
  # ==========================================================================

  d2-geo:
    build:
      context: .
      dockerfile: docker/Dockerfile.geo
      target: dev
    container_name: d2-geo
    ports:
      - "${GEO_PORT}:${GEO_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${GEO_SERVICE_NAME}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:${GEO_PORT}"
      # Docker DNS overrides (internal port 5432, not host-mapped ${POSTGRES_PORT}).
      GEO_DATABASE_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${POSTGRES_NAME}:5432/${GEO_DB_NAME}"
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      RABBITMQ_URL: "amqp://${MQ_USERNAME}:${MQ_PASSWORD}@${RABBITMQ_NAME}:${RABBITMQ_PORT}"
      # OTel → Alloy (inside Docker network).
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/logs"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/metrics"
      LOG_LEVEL: debug
    volumes:
      - ./backends/dotnet:/src/backends/dotnet
      - ./contracts:/src/contracts
      - ./Directory.Build.props:/src/Directory.Build.props:ro
      - ./stylecop.json:/src/stylecop.json:ro
    networks: [d2-network]
    depends_on:
      d2-postgres:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
      d2-rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf --http2-prior-knowledge http://localhost:${GEO_PORT}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  d2-auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
      target: dev
    container_name: d2-auth
    ports:
      - "${AUTH_HTTP_PORT}:${AUTH_HTTP_PORT}"
      - "${AUTH_GRPC_PORT}:${AUTH_GRPC_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${AUTH_SERVICE_NAME}
      # Docker DNS overrides.
      AUTH_DATABASE_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${POSTGRES_NAME}:5432/${AUTH_DB_NAME}"
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      RABBITMQ_URL: "amqp://${MQ_USERNAME}:${MQ_PASSWORD}@${RABBITMQ_NAME}:${RABBITMQ_PORT}"
      GEO_GRPC_ADDRESS: "${GEO_SERVICE_NAME}:${GEO_PORT}"
      # OTel → Alloy.
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/logs"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/metrics"
      LOG_LEVEL: debug
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./backends/node:/app/backends/node
      - ./contracts:/app/contracts
      - ./clients/web/package.json:/app/clients/web/package.json:ro
      - d2-node-modules:/app/node_modules
    networks: [d2-network]
    depends_on:
      d2-node-init:
        condition: service_completed_successfully
      d2-postgres:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
      d2-rabbitmq:
        condition: service_healthy
      d2-geo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const s=require(''net'').createConnection(${AUTH_HTTP_PORT},()=>{s.destroy();process.exit(0)});s.on(''error'',()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  d2-comms:
    build:
      context: .
      dockerfile: docker/Dockerfile.comms
      target: dev
    container_name: d2-comms
    ports:
      - "${COMMS_GRPC_PORT}:${COMMS_GRPC_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${COMMS_SERVICE_NAME}
      # Docker DNS overrides.
      COMMS_DATABASE_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${POSTGRES_NAME}:5432/${COMMS_DB_NAME}"
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      RABBITMQ_URL: "amqp://${MQ_USERNAME}:${MQ_PASSWORD}@${RABBITMQ_NAME}:${RABBITMQ_PORT}"
      GEO_GRPC_ADDRESS: "${GEO_SERVICE_NAME}:${GEO_PORT}"
      # OTel → Alloy.
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/logs"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/metrics"
      LOG_LEVEL: debug
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./backends/node:/app/backends/node
      - ./contracts:/app/contracts
      - ./clients/web/package.json:/app/clients/web/package.json:ro
      - d2-node-modules:/app/node_modules
    networks: [d2-network]
    depends_on:
      d2-node-init:
        condition: service_completed_successfully
      d2-postgres:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
      d2-rabbitmq:
        condition: service_healthy
      d2-geo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const s=require(''net'').createConnection(${COMMS_GRPC_PORT},()=>{s.destroy();process.exit(0)});s.on(''error'',()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  d2-files:
    build:
      context: .
      dockerfile: docker/Dockerfile.files
      target: dev
    container_name: d2-files
    ports:
      - "${FILES_HTTP_PORT}:${FILES_HTTP_PORT}"
      - "${FILES_GRPC_PORT}:${FILES_GRPC_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${FILES_SERVICE_NAME}
      # Docker DNS overrides.
      FILES_DATABASE_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${POSTGRES_NAME}:5432/${FILES_DB_NAME}"
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      RABBITMQ_URL: "amqp://${MQ_USERNAME}:${MQ_PASSWORD}@${RABBITMQ_NAME}:${RABBITMQ_PORT}"
      FILES_S3_ENDPOINT: "http://${MINIO_NAME}:9000"
      FILES_S3_ACCESS_KEY: "${S3_USERNAME}"
      FILES_S3_SECRET_KEY: "${S3_PASSWORD}"
      FILES_JWKS_URL: "http://d2-auth:${AUTH_HTTP_PORT}/api/auth/jwks"
      CLAMAV_HOST: "${CLAMAV_NAME}"
      GEO_GRPC_ADDRESS: "${GEO_SERVICE_NAME}:${GEO_PORT}"
      SIGNALR_GRPC_ADDRESS: "${SIGNALR_SERVICE_NAME}:${SIGNALR_GRPC_PORT}"
      # OTel → Alloy.
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/logs"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/metrics"
      LOG_LEVEL: debug
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./backends/node:/app/backends/node
      - ./contracts:/app/contracts
      - ./clients/web/package.json:/app/clients/web/package.json:ro
      - d2-node-modules:/app/node_modules
    networks: [d2-network]
    depends_on:
      d2-node-init:
        condition: service_completed_successfully
      d2-postgres:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
      d2-rabbitmq:
        condition: service_healthy
      d2-minio:
        condition: service_healthy
      d2-clamav:
        condition: service_healthy
      d2-geo:
        condition: service_healthy
      d2-auth:
        condition: service_healthy
      d2-signalr:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const s=require(''net'').createConnection(${FILES_HTTP_PORT},()=>{s.destroy();process.exit(0)});s.on(''error'',()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  d2-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
      target: dev
    container_name: d2-gateway
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${GATEWAY_SERVICE_NAME}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:${GATEWAY_PORT}"
      # Docker DNS overrides.
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      GEO_GRPC_ADDRESS: "${GEO_SERVICE_NAME}:${GEO_PORT}"
      AUTH_GRPC_ADDRESS: "${AUTH_SERVICE_NAME}:${AUTH_GRPC_PORT}"
      COMMS_GRPC_ADDRESS: "${COMMS_SERVICE_NAME}:${COMMS_GRPC_PORT}"
      GATEWAY_AUTH__AUTHSERVICEBASEURL: "http://${AUTH_SERVICE_NAME}:${AUTH_HTTP_PORT}"
      # OTel → Alloy.
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/logs"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/metrics"
      LOG_LEVEL: debug
    volumes:
      - ./backends/dotnet:/src/backends/dotnet
      - ./contracts:/src/contracts
      - ./Directory.Build.props:/src/Directory.Build.props:ro
      - ./stylecop.json:/src/stylecop.json:ro
    networks: [d2-network]
    depends_on:
      d2-geo:
        condition: service_healthy
      d2-auth:
        condition: service_healthy
      d2-comms:
        condition: service_healthy
      d2-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${GATEWAY_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  d2-signalr:
    build:
      context: .
      dockerfile: docker/Dockerfile.signalr
      target: dev
    container_name: d2-signalr
    ports:
      - "${SIGNALR_HTTP_PORT}:${SIGNALR_HTTP_PORT}"
      - "${SIGNALR_GRPC_PORT}:${SIGNALR_GRPC_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${SIGNALR_SERVICE_NAME}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:${SIGNALR_HTTP_PORT};http://+:${SIGNALR_GRPC_PORT}"
      # Docker DNS overrides.
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      SIGNALR_AUTH__AUTHSERVICEBASEURL: "http://${AUTH_SERVICE_NAME}:${AUTH_HTTP_PORT}"
      # OTel → Alloy.
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_GRPC_PORT}"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_GRPC_PORT}"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_GRPC_PORT}"
    volumes:
      - ./D2.sln:/src/D2.sln:ro
      - ./Directory.Build.props:/src/Directory.Build.props:ro
      - ./stylecop.json:/src/stylecop.json:ro
      - ./backends/dotnet:/src/backends/dotnet
      - ./contracts:/src/contracts
    networks: [d2-network]
    depends_on:
      d2-redis:
        condition: service_healthy
      d2-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${SIGNALR_HTTP_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  d2-dkron-mgr:
    build:
      context: .
      dockerfile: docker/Dockerfile.dkron-mgr
      target: dev
    container_name: d2-dkron-mgr
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${DKRON_MGR_SERVICE_NAME}
      # Docker DNS overrides (Dkron internal port is 8080, host-mapped to ${DKRON_DASHBOARD_PORT}).
      DKRON_MGR__DKRON_URL: "http://${DKRON_NAME}:8080"
      DKRON_MGR__GATEWAY_URL: "http://${GATEWAY_SERVICE_NAME}:${GATEWAY_PORT}"
      # OTel → Alloy.
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/logs"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://${ALLOY_NAME}:${OTLP_HTTP_PORT}/v1/metrics"
      LOG_LEVEL: debug
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./backends/node:/app/backends/node
      - ./clients/web/package.json:/app/clients/web/package.json:ro
      - d2-node-modules:/app/node_modules
    networks: [d2-network]
    depends_on:
      d2-node-init:
        condition: service_completed_successfully
      d2-dkron:
        condition: service_healthy
      d2-gateway:
        condition: service_healthy
    restart: unless-stopped

  d2-sveltekit:
    build:
      context: .
      dockerfile: docker/Dockerfile.sveltekit
      target: dev
    container_name: d2-sveltekit
    ports:
      - "${SVELTEKIT_PORT}:${SVELTEKIT_PORT}"
    env_file: .env.local
    environment:
      OTEL_SERVICE_NAME: ${SVELTEKIT_SERVICE_NAME}
      # Vite dev server port (must match host port mapping for health checks).
      VITE_PORT: ${SVELTEKIT_PORT}
      # Server-side Docker DNS overrides.
      SVELTEKIT_AUTH__URL: "http://${AUTH_SERVICE_NAME}:${AUTH_HTTP_PORT}"
      SVELTEKIT_GATEWAY__URL: "http://${GATEWAY_SERVICE_NAME}:${GATEWAY_PORT}"
      GEO_GRPC_ADDRESS: "${GEO_SERVICE_NAME}:${GEO_PORT}"
      REDIS_URL: "redis://:${CACHE_PASSWORD}@${REDIS_NAME}:${REDIS_PORT}"
      # Browser-facing URLs (PUBLIC_GATEWAY_URL, PUBLIC_FARO_COLLECTOR_URL,
      # AUTH_BASE_URL, AUTH_EMAIL_BASE_URL) come from .env.local — they are
      # hit by the user's browser or used in email links, not by containers.
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./clients/web:/app/clients/web
      - d2-sveltekit-modules:/app/clients/web/node_modules
      - ./backends/node:/app/backends/node
      - ./contracts:/app/contracts
      - d2-node-modules:/app/node_modules
    networks: [d2-network]
    depends_on:
      d2-node-init:
        condition: service_completed_successfully
      d2-gateway:
        condition: service_healthy
      d2-auth:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:${SVELTEKIT_PORT}'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped
